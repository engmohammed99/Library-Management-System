version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: library_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: library_db
    ports:
      - "5432:5432" # Allows you to still access the DB from your host machine (e.g. pgAdmin)
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d library_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: library_api
    restart: always
    ports:
      - "8080:8080"
    environment:
      # Notice we changed 'localhost' to 'db', which is the service name above inside the Docker network
      - DB_URL=postgres://postgres:postgres@db:5432/library_db?sslmode=disable
      - PORT=8080
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
